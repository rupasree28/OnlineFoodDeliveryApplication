<!-- success.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Successful</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#ffb6d9,#ffd6ec,#ffc1f3);
    overflow:hidden;
}

.container{
    width:420px;
    padding:40px;
    border-radius:25px;
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border:2px solid rgba(255,255,255,0.3);
    box-shadow:0 0 40px rgba(255,20,147,0.4);
    animation:pop 1s ease;
}

@keyframes pop{
    0%{
        transform:scale(0.5);
        opacity:0;
    }
    100%{
        transform:scale(1);
        opacity:1;
    }
}

.success-icon{
    width:120px;
    height:120px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#00ff99,#00cc66);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:60px;
    color:white;
    box-shadow:0 0 30px #00ff99;
    animation:glow 2s infinite alternate;
}

@keyframes glow{
    from{
        box-shadow:0 0 20px #00ff99;
    }
    to{
        box-shadow:0 0 45px #00ff99;
    }
}

h1{
    margin-top:25px;
    color:#ffffff;
    font-size:38px;
    text-shadow:0 0 10px deeppink;
}

h2{
    margin-top:15px;
    color:#4b004f;
    font-size:28px;
}

p{
    margin-top:15px;
    color:#5f005f;
    font-size:18px;
    line-height:1.6;
}

button{
    margin-top:30px;
    padding:14px 35px;
    border:none;
    border-radius:50px;
    background:linear-gradient(135deg,#ff1493,#ff69b4);
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:0.4s;
    box-shadow:0 0 20px rgba(255,20,147,0.5);
}

button:hover{
    transform:scale(1.08);
    box-shadow:0 0 35px hotpink;
}

.particles span{
    position:absolute;
    width:15px;
    height:15px;
    background:white;
    border-radius:50%;
    animation:float 10s linear infinite;
    opacity:0.5;
}

@keyframes float{
    0%{
        transform:translateY(100vh) scale(0);
    }
    100%{
        transform:translateY(-100vh) scale(1);
    }
}

</style>
</head>

<body>

<div class="particles">
    <span style="left:10%; animation-duration:8s;"></span>
    <span style="left:25%; animation-duration:12s;"></span>
    <span style="left:40%; animation-duration:10s;"></span>
    <span style="left:55%; animation-duration:14s;"></span>
    <span style="left:70%; animation-duration:9s;"></span>
    <span style="left:85%; animation-duration:11s;"></span>
</div>

<div class="container">

    <div class="success-icon">
        ✔
    </div>

    <h1>Login Successful</h1>

    <h2>Welcome, Rupasree 👋</h2>

    <p>
        Your authentication was verified successfully.<br>
        Access granted to the system.
    </p>

    <button>Go To Dashboard</button>

</div>

</body>
</html>
